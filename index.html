<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comprehensive Loan Application Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        /* Base Container */
        .form-container {
            max-width: 1100px;
            margin: auto;
            padding: 20px;
        }

        /* Mobile View: Elevated Cards Layout */
        @media (max-width: 767px) {
            .responsive-section {
                background: #ffffff;
                border: 1px solid #e0e0e0;
                border-radius: 10px;
                padding: 20px;
                margin-bottom: 20px;
                box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            }
            .section-title {
                font-size: 1.15rem;
                color: #0d6efd;
                border-bottom: 2px solid #e9ecef;
                padding-bottom: 10px;
                margin-bottom: 15px;
                font-weight: bold;
            }
        }

        /* Desktop View: Flat Tabular Grid Layout */
        @media (min-width: 768px) {
            .responsive-section {
                background: transparent;
                border: none;
                padding: 0 15px;
                box-shadow: none;
                border-right: 1px solid #dee2e6; /* Column separator */
            }
            /* Remove border from the last column */
            .col-md-4:last-child .responsive-section {
                border-right: none;
            }
            .section-title {
                font-size: 1.1rem;
                color: #495057;
                font-weight: bold;
                margin-bottom: 15px;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }
        }

        .error {
            color: #dc3545;
            font-size: 0.875em;
            margin-top: 0.25rem;
        }
    </style>
</head>

<body class="bg-light">

<div class="form-container mt-4">
    <h2 class="mb-4 text-center fw-bold text-primary">Loan Application Form</h2>

    <form id="loanForm" class="bg-white p-md-4 rounded shadow-sm" novalidate>
        
        <div class="row">

            <div class="col-md-4 mb-3">
                <div class="responsive-section">
                    <div class="section-title">Personal Details</div>
                    
                    <div class="mb-3">
                        <label class="form-label text-muted fw-semibold">First Name</label>
                        <input type="text" class="form-control" id="firstName" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted fw-semibold">Middle Name</label>
                        <input type="text" class="form-control" id="middleName">
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted fw-semibold">Last Name</label>
                        <input type="text" class="form-control" id="lastName" required>
                    </div>

                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label text-muted fw-semibold">Age</label>
                            <input type="number" class="form-control" id="age" required>
                            <div id="ageError" class="error"></div>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label text-muted fw-semibold">Gender</label>
                            <select class="form-select" id="gender" required>
                                <option value="">Select</option>
                                <option value="M">Male</option>
                                <option value="F">Female</option>
                                <option value="O">Other</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted fw-semibold">Phone Number</label>
                        <input type="tel" class="form-control" id="phone" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted fw-semibold">Email Address</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>
                </div>
            </div>

            <div class="col-md-4 mb-3">
                <div class="responsive-section">
                    <div class="section-title">Identity & Employment</div>

                    <div class="mb-3">
                        <label class="form-label text-muted fw-semibold">Educational Qualification</label>
                        <select class="form-select" id="education" required>
                            <option value="">Select Qualification</option>
                            <option value="High School">High School</option>
                            <option value="Diploma">Diploma</option>
                            <option value="Bachelors">Bachelor's Degree</option>
                            <option value="Masters">Master's Degree</option>
                            <option value="Doctorate">Doctorate (PhD)</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted fw-semibold">Employment Type</label>
                        <select class="form-select" id="employmentType" required>
                            <option value="">Select Type</option>
                            <option value="Salaried">Salaried</option>
                            <option value="Self-Employed">Self-Employed</option>
                            <option value="Business Owner">Business Owner</option>
                            <option value="Unemployed">Unemployed</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted fw-semibold">Profession / Job Title</label>
                        <input type="text" class="form-control" id="profession" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted fw-semibold">Aadhar ID</label>
                        <input type="text" class="form-control" id="aadhar" required>
                        <div id="aadharError" class="error"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted fw-semibold">PAN Number</label>
                        <input type="text" class="form-control" id="pan" required>
                        <div id="panError" class="error"></div>
                    </div>
                </div>
            </div>

            <div class="col-md-4 mb-3">
                <div class="responsive-section h-100">
                    <div class="section-title">Financial Details</div>

                    <div class="mb-3">
                        <label class="form-label text-muted fw-semibold">Monthly Income (₹)</label>
                        <input type="number" class="form-control" id="monthlyIncome" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted fw-semibold">CIBIL Score</label>
                        <input type="number" class="form-control" id="cibil" required>
                        <div id="cibilError" class="error"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted fw-semibold">Loan Purpose</label>
                        <select class="form-select" id="loanPurpose" required>
                            <option value="">Select Purpose</option>
                            <option value="Home">Home Loan</option>
                            <option value="Personal">Personal Loan</option>
                            <option value="Vehicle">Vehicle Loan</option>
                            <option value="Education">Education Loan</option>
                            <option value="Business">Business Loan</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted fw-semibold">Loan Amount Required</label>
                        <input type="number" class="form-control" id="loanAmount" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted fw-semibold">Loan Tenure (in months)</label>
                        <input type="number" class="form-control" id="loanTenure" required>
                    </div>
                </div>
            </div>

        </div> <hr class="d-none d-md-block my-4">

        <div class="d-flex justify-content-between px-md-3 pb-3 mt-3">
            <button type="submit" class="btn btn-primary px-5 py-2 fw-bold shadow-sm">Submit Application</button>
            <button type="reset" class="btn btn-outline-secondary px-5 py-2 fw-bold shadow-sm">Clear Form</button>
        </div>

    </form>
</div>

<script src="script.js"></script>

</body>
</html>
