<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loan Application Form</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="form-container">
    <h2 class="mb-4 text-center">Loan Application Form</h2>

    <form id="loanForm" novalidate>

        <!-- Name Fields -->
        <div class="row mb-3">
            <div class="col">
                <label class="form-label">First Name</label>
                <input type="text" class="form-control" id="firstName" required>
            </div>

            <div class="col">
                <label class="form-label">Middle Name</label>
                <input type="text" class="form-control" id="middleName">
            </div>

            <div class="col">
                <label class="form-label">Last Name</label>
                <input type="text" class="form-control" id="lastName" required>
            </div>
        </div>

        <!-- Age -->
        <div class="mb-3">
            <label class="form-label">Age</label>
            <input type="number" class="form-control" id="age" required>
            <div id="ageError" class="error"></div>
        </div>

        <!-- Gender -->
        <div class="mb-3">
            <label class="form-label">Gender</label>
            <select class="form-select" id="gender" required>
                <option value="">Select</option>
                <option value="M">Male</option>
                <option value="F">Female</option>
                <option value="O">Others</option>
            </select>
        </div>

        <!-- CIBIL -->
        <div class="mb-3">
            <label class="form-label">CIBIL Score</label>
            <input type="number" class="form-control" id="cibil" required>
            <div id="cibilError" class="error"></div>
        </div>

        <!-- Profession -->
        <div class="mb-3">
            <label class="form-label">Profession</label>
            <input type="text" class="form-control" id="profession" required>
        </div>

        <!-- Aadhar -->
        <div class="mb-3">
            <label class="form-label">Aadhar ID</label>
            <input type="text" class="form-control" id="aadhar" required>
            <div id="aadharError" class="error"></div>
        </div>

        <!-- PAN -->
        <div class="mb-3">
            <label class="form-label">PAN Number</label>
            <input type="text" class="form-control" id="pan" required>
            <div id="panError" class="error"></div>
        </div>

        <!-- Loan Amount -->
        <div class="mb-3">
            <label class="form-label">Loan Amount</label>
            <input type="number" class="form-control" id="loanAmount" required>
        </div>

        <!-- Buttons -->
        <div class="d-flex justify-content-between mt-4">
            <button type="submit" class="btn-submit">Submit</button>
            <button type="reset" class="btn-clear">Clear</button>
        </div>

    </form>
</div>

<script src="script.js"></script>

</body>
</html>
